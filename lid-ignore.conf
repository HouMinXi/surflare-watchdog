# /etc/systemd/logind.conf.d/lid-ignore.conf
#
# Prevent laptop from suspending when lid is closed,
# regardless of whether an external monitor is connected.
#
# Use case: run headless (lid closed, external monitor off)
# without the VPN watchdog being interrupted by suspend.
#
# Install:
#   sudo install -o root -g root -m 0644 lid-ignore.conf \
#       /etc/systemd/logind.conf.d/lid-ignore.conf
#   sudo systemctl kill -s HUP systemd-logind
#
# Verify:
#   systemd-analyze cat-config systemd/logind.conf | grep -i handle

[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore

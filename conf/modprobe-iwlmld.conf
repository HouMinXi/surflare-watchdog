# Set Intel Wi-Fi driver (iwlmld — Wi-Fi 6E / Wi-Fi 7) to CAM (Continuously Active Mode).
#
# power_scheme=2 (Balanced, the default) still performs driver-level power management
# that causes the firmware to miss AP beacon frames, triggering repeated disconnects
# even when NetworkManager power saving is disabled.
# power_scheme=1 (CAM) keeps the radio fully awake at all times.
#
# Install: sudo cp conf/modprobe-iwlmld.conf /etc/modprobe.d/iwlmld.conf
#          sudo modprobe -r iwlmld && sudo modprobe iwlmld   # brief Wi-Fi disconnect
#
# power_scheme values: 1=CAM (fully active)  2=Balanced  3=Low power
options iwlmld power_scheme=1

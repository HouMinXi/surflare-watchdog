# Disable NetworkManager's Wi-Fi power saving.
#
# Power saving causes the Wi-Fi NIC to miss beacon frames from the AP,
# which triggers iwlwifi "missed beacons exceeds threshold" warnings and
# intermittent AP disconnects — even at excellent signal strength (-40 dBm).
# Disabling it keeps the radio fully awake and eliminates spurious disconnects.
#
# Install: sudo cp conf/nm-wifi-power.conf /etc/NetworkManager/conf.d/wifi-power.conf
#          sudo nmcli general reload conf
#
# powersave values: 0=default  1=ignore(NM won't manage)  2=disable  3=enable
[connection]
wifi.powersave = 2
